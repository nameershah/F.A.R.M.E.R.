<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="F.A.R.M.E.R. — AI-powered crop diagnosis and agricultural advisory for smallholder farmers in Khyber Pakhtunkhwa, Pakistan." />

    <!-- ============================================================
         SECURITY: Content-Security-Policy
         Restricts resource loading to known origins only.
         - script-src 'self' allows only bundled scripts (no inline eval)
         - connect-src allows the backend API and Google Fonts + Open-Meteo
         - img-src 'self' data: covers bundled assets and object-URL previews
         ============================================================ -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'none';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self' http://localhost:3001 https://fonts.googleapis.com https://fonts.gstatic.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Security headers via meta (belt-and-suspenders; real headers live on the server) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <title>F.A.R.M.E.R. — AI Crop Diagnosis</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
